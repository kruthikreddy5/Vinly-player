<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signal</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family: monospace;
background:#0f0f0f;
color:#e6e6e6;
height:100vh;
display:flex;
flex-direction:column;
}

/* header */

#header{
padding:14px 20px;
border-bottom:1px solid #222;
font-size:14px;
letter-spacing:1px;
opacity:.8;
}

/* chat area */

#chat{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:14px;
}

/* bubbles */

.msg{
max-width:75%;
padding:12px 14px;
border-radius:10px;
line-height:1.4;
white-space:pre-wrap;
}

.user{
align-self:flex-end;
background:#1f2937;
}

.bot{
align-self:flex-start;
background:#151515;
border:1px solid #2a2a2a;
}

/* typing animation */

.typing::after{
content:"...";
animation:dots 1.2s infinite;
}

@keyframes dots{
0%{content:"."}
33%{content:".."}
66%{content:"..."}
}

/* input bar */

#inputBar{
display:flex;
gap:10px;
padding:14px;
border-top:1px solid #222;
background:#0f0f0f;
}

#input{
flex:1;
background:#111;
border:1px solid #2a2a2a;
color:#eee;
padding:10px;
border-radius:8px;
resize:none;
outline:none;
font-family:monospace;
}

#send{
background:#e6e6e6;
color:#000;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

#send:disabled{
opacity:.4;
cursor:not-allowed;
}

</style>
</head>

<body>

<div id="header">
Signal — personal AI
</div>

<div id="chat">
<div class="msg bot">Hello. I'm Signal. Ask me anything.</div>
</div>

<div id="inputBar">
<textarea id="input" rows="1" placeholder="Type a message..."></textarea>
<button id="send">Send</button>
</div>

<script>

const API_KEY = "YOUR_OPENROUTER_KEY";
const MODEL = "meta-llama/llama-3.1-8b-instruct:free";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

let history = [];

send.onclick = sendMessage;

input.addEventListener("keydown", e=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendMessage();
}
});

function addMessage(text,cls){
const div=document.createElement("div");
div.className="msg "+cls;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
return div;
}

async function sendMessage(){

const text=input.value.trim();
if(!text) return;

input.value="";

addMessage(text,"user");

history.push({role:"user",content:text});

send.disabled=true;

const thinking=addMessage("thinking","bot typing");

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:MODEL,
messages:[
{role:"system",content:"You are Signal, a helpful minimal AI assistant."},
...history
]
})
});

const data=await res.json();

const reply=data.choices[0].message.content;

thinking.remove();

addMessage(reply,"bot");

history.push({role:"assistant",content:reply});

}catch(err){

thinking.remove();

addMessage("Error contacting AI.","bot");

}

send.disabled=false;

}

</script>

</body>
</html>
