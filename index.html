<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signal</title>

<style>

body{
background:#0f0f0f;
color:#e6e6e6;
font-family:monospace;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

#header{
padding:14px;
border-bottom:1px solid #222;
opacity:.8;
}

#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
max-width:75%;
padding:12px;
border-radius:10px;
white-space:pre-wrap;
}

.user{
background:#1f2937;
align-self:flex-end;
}

.bot{
background:#151515;
border:1px solid #2a2a2a;
align-self:flex-start;
}

#inputBar{
display:flex;
gap:10px;
padding:10px;
border-top:1px solid #222;
}

#input{
flex:1;
background:#111;
border:1px solid #333;
color:white;
padding:10px;
border-radius:8px;
}

#send{
background:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="header">Signal — personal AI</div>

<div id="chat"></div>

<div id="inputBar">
<input id="input" placeholder="Type a message">
<button id="send">Send</button>
</div>

<script>

const API_URL="https://bitter-rain-c5b3.kruthikreddy5850.workers.dev";

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const send=document.getElementById("send");

let history=JSON.parse(localStorage.getItem("signal_memory"))||[];

function add(text,cls){

let div=document.createElement("div");

div.className="msg "+cls;

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

history.forEach(m=>{
add(m.content,m.role==="user"?"user":"bot")
})

async function sendMessage(){

let text=input.value.trim();

if(!text)return;

input.value="";

add(text,"user");

history.push({role:"user",content:text});

save();

let thinking=add("thinking...","bot");

try{

let res=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:history
})
});

let data=await res.json();

let reply=data.choices[0].message.content;

chat.lastChild.remove();

add(reply,"bot");

history.push({role:"assistant",content:reply});

save();

}catch(e){

chat.lastChild.remove();

add("Connection failed.","bot");

}

}

function save(){

localStorage.setItem("signal_memory",JSON.stringify(history));

}

send.onclick=sendMessage;

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
sendMessage();
}
});

</script>

</body>
</html>
