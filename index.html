<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
background: #0d0d0d;
color: #f0f0f0;
height: 100dvh;
display: flex;
flex-direction: column;
overflow: hidden;
}

#header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 16px;
background: #141414;
border-bottom: 1px solid #222;
flex-shrink: 0;
}
#header h1 { font-size: 20px; font-weight: 700; color: #00c2ff; letter-spacing: 1px; }
#status { font-size: 12px; color: #555; margin-right: 4px; }

.icon-btn {
background: #1e1e1e; border: 1px solid #2a2a2a; color: #888;
width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
font-size: 16px; display: inline-flex; align-items: center; justify-content: center;
}
.icon-btn:hover { border-color: #00c2ff; color: #00c2ff; }

#chat {
flex: 1; overflow-y: auto; padding: 16px;
display: flex; flex-direction: column; gap: 12px;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

.welcome { text-align: center; padding: 40px 20px; }
.welcome h2 { font-size: 24px; color: #00c2ff; margin-bottom: 8px; }
.welcome p { font-size: 14px; color: #555; line-height: 1.6; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
.chip { padding: 8px 14px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; font-size: 13px; color: #777; cursor: pointer; }
.chip:hover { border-color: #00c2ff; color: #f0f0f0; }

.msg { display: flex; gap: 10px; align-items: flex-start; max-width: 88%; animation: fi 0.2s ease; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }
@keyframes fi { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.av { width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; margin-top: 2px; }
.msg.ai .av { background: #00c2ff; color: #000; }
.msg.user .av { background: #1e1e1e; border: 1px solid #2a2a2a; color: #777; }

.bub { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.65; word-break: break-word; }
.msg.ai .bub { background: #1a1a1a; border: 1px solid #222; border-top-left-radius: 3px; }
.msg.user .bub { background: #002233; border: 1px solid #003344; border-top-right-radius: 3px; color: #e0f4ff; }

.bub code { background: #111; border: 1px solid #2a2a2a; border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 12px; color: #00c2ff; }
.bub pre { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 6px 0; }
.bub pre code { background: none; border: none; padding: 0; color: #ccc; }

.dots span { display: inline-block; width: 6px; height: 6px; background: #00c2ff; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-5px);opacity:1} }

#input-area { padding: 10px 16px 16px; background: #141414; border-top: 1px solid #222; flex-shrink: 0; }
#input-row { display: flex; gap: 8px; align-items: flex-end; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 8px 10px; }
#input-row:focus-within { border-color: #00c2ff44; }
#msg-input { flex: 1; background: none; border: none; outline: none; color: #f0f0f0; font-size: 14px; font-family: inherit; resize: none; min-height: 22px; max-height: 120px; line-height: 1.5; }
#msg-input::placeholder { color: #333; }

#send-btn { width: 34px; height: 34px; background: #00c2ff; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
#send-btn svg { width: 16px; height: 16px; fill: #000; }
#hint { font-size: 11px; color: #333; text-align: center; margin-top: 8px; }

#modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
#modal.open { display: flex; }
.mbox { background: #141414; border: 1px solid #222; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; }
.mbox h2 { font-size: 18px; margin-bottom: 18px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: #555; text-transform: uppercase; letter-spacing:.06em; margin-bottom: 6px; }
.field input { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px 12px; color: #f0f0f0; font-size: 14px; font-family: inherit; outline: none; }
.field input:focus { border-color: #00c2ff44; }
.field input::placeholder { color: #333; }
.btn-save { width: 100%; padding: 12px; background: #00c2ff; color: #000; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
.mnote { font-size: 12px; color: #444; margin-top: 12px; line-height: 1.5; text-align: center; }
.mnote a { color: #00c2ff; text-decoration: none; }
</style>

</head>
<body>

<div id="modal">
  <div class="mbox">
    <h2>⚙️ Settings</h2>
    <div class="field">
      <label>OpenRouter API Key</label>
      <input type="password" id="s-key" placeholder="sk-or-v1-..." />
    </div>
    <div class="field">
      <label>Your Name (optional)</label>
      <input type="text" id="s-name" placeholder="What should Signal call you?" />
    </div>
    <button class="btn-save" onclick="saveSettings()">Save</button>
    <p class="mnote">Free key at <a href="https://openrouter.ai" target="_blank">openrouter.ai</a></p>
  </div>
</div>

<div id="header">
  <h1>⚡ Signal</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="status">ready</span>
    <button class="icon-btn" onclick="openSettings()">⚙️</button>
    <button class="icon-btn" onclick="clearChat()">🗑️</button>
  </div>
</div>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>Signal</h2>
    <p>Your personal AI assistant.<br>Ask me anything.</p>
    <div class="chips">
      <div class="chip" onclick="quickSend('Help me write an email')">✉️ Write an email</div>
      <div class="chip" onclick="quickSend('Debug my code')">🐛 Debug code</div>
      <div class="chip" onclick="quickSend('Help me plan a project')">📋 Plan a project</div>
      <div class="chip" onclick="quickSend('What can you help me with?')">💡 What can you do?</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="msg-input" placeholder="Message Signal..." rows="1"></textarea>
    <button id="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div id="hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
var API_KEY = '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';
var OR_URL  = 'https://openrouter.ai/api/v1/chat/completions';
var MODEL   = 'meta-llama/llama-4-maverick:free';

var apiKey   = localStorage.getItem('sig_key')  || API_KEY;
var userName = localStorage.getItem('sig_name') || '';
var history  = [];
var busy     = false;

var ta = document.getElementById('msg-input');
ta.addEventListener('input', function() {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
});
ta.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function openSettings() {
  document.getElementById('s-key').value = apiKey;
  document.getElementById('s-name').value = userName;
  document.getElementById('modal').classList.add('open');
}

function saveSettings() {
  var k = document.getElementById('s-key').value.trim();
  var n = document.getElementById('s-name').value.trim();
  if (k) { apiKey = k; localStorage.setItem('sig_key', k); }
  userName = n; localStorage.setItem('sig_name', n);
  document.getElementById('modal').classList.remove('open');
}

function quickSend(text) {
  ta.value = text;
  send();
}

function send() {
  if (busy) return;
  var text = ta.value.trim();
  if (!text) return;

  ta.value = '';
  ta.style.height = 'auto';

  var w = document.getElementById('welcome');
  if (w) w.remove();

  addBubble('user', text);
  history.push({ role: 'user', content: text });

  var typing = addTyping();
  setBusy(true);

  var messages = [{ role: 'system', content: sysPrompt() }];
  for (var i = 0; i < history.length; i++) {
    messages.push(history[i]);
  }

  fetch(OR_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
      'HTTP-Referer': 'https://signal-ai.app',
      'X-Title': 'Signal'
    },
    body: JSON.stringify({
      model: MODEL,
      messages: messages,
      temperature: 0.8,
      max_tokens: 2048
    })
  })
  .then(function(res) {
    return res.json().then(function(data) {
      if (!res.ok) throw new Error(data && data.error && data.error.message ? data.error.message : 'Error ' + res.status);
      return data;
    });
  })
  .then(function(data) {
    var reply = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    if (!reply) throw new Error('No reply received. Please try again.');
    typing.remove();
    history.push({ role: 'assistant', content: reply });
    if (history.length > 60) history = history.slice(-60);
    addBubble('ai', reply);
    setBusy(false);
  })
  .catch(function(err) {
    typing.remove();
    addBubble('ai', '⚠️ ' + err.message);
    history.pop();
    setBusy(false);
  });
}

function sysPrompt() {
  var s = 'You are Signal, a smart and helpful personal AI assistant.';
  if (userName) s += ' The user\'s name is ' + userName + '.';
  s += ' Be concise, direct, and genuinely useful. Help with anything: code, writing, emails, planning, debugging, research.';
  s += ' Today is ' + new Date().toDateString() + '.';
  return s;
}

function addBubble(role, text) {
  var chat = document.getElementById('chat');
  var wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  var av = document.createElement('div');
  av.className = 'av';
  av.textContent = role === 'ai' ? 'S' : (userName ? userName[0].toUpperCase() : 'U');

  var bub = document.createElement('div');
  bub.className = 'bub';
  bub.innerHTML = fmt(text);

  wrap.appendChild(av);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  scrollDown();
}

function addTyping() {
  var chat = document.getElementById('chat');
  var wrap = document.createElement('div');
  wrap.className = 'msg ai';

  var av = document.createElement('div');
  av.className = 'av';
  av.textContent = 'S';

  var bub = document.createElement('div');
  bub.className = 'bub dots';
  bub.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(av);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  scrollDown();
  return wrap;
}

function fmt(text) {
  var t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, function(_, c) { return '<pre><code>' + c.trim() + '</code></pre>'; });

t = t.replace(/`([^`\n]+)`/g, ‘<code>$1</code>’);
t = t.replace(/**([^*]+)**/g, ‘<strong>$1</strong>’);
t = t.replace(/\n/g, ‘<br>’);
return t;
}

function clearChat() {
if (!confirm(‘Clear conversation?’)) return;
history = [];
document.getElementById(‘chat’).innerHTML = ‘<div class="welcome" id="welcome"><h2>Signal</h2><p>Your personal AI assistant.<br>Ask me anything.</p><div class="chips"><div class="chip" onclick="quickSend(\'Help me write an email\')">✉️ Write an email</div><div class="chip" onclick="quickSend(\'Debug my code\')">🐛 Debug code</div><div class="chip" onclick="quickSend(\'Help me plan a project\')">📋 Plan a project</div></div></div>’;
}

function setBusy(val) {
busy = val;
document.getElementById(‘send-btn’).disabled = val;
document.getElementById(‘status’).textContent = val ? ‘thinking…’ : ‘ready’;
}

function scrollDown() {
var c = document.getElementById(‘chat’);
setTimeout(function() { c.scrollTop = c.scrollHeight; }, 50);
}
</script>

</body>
</html>
