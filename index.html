<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; height: 100vh; }
  #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .u { align-self: flex-end; background: #005577; padding: 10px 14px; border-radius: 12px; max-width: 85%; white-space: pre-wrap; word-break: break-word; }
  .a { align-self: flex-start; background: #1e1e1e; border: 1px solid #333; padding: 10px 14px; border-radius: 12px; max-width: 85%; white-space: pre-wrap; word-break: break-word; }
  .err { align-self: flex-start; background: #3a0000; border: 1px solid #f44; color: #f99; padding: 10px 14px; border-radius: 12px; max-width: 85%; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
  #bar { display: flex; gap: 8px; padding: 12px; background: #1a1a1a; border-top: 1px solid #333; }
  #box { flex: 1; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 10px; color: #eee; font-size: 15px; font-family: sans-serif; resize: none; outline: none; }
  #go { background: #00c2ff; color: #000; border: none; border-radius: 8px; padding: 10px 20px; font-size: 15px; font-weight: bold; cursor: pointer; }
  #go:disabled { background: #444; color: #888; }
</style>
</head>
<body>

<div id="log">
  <div class="a">Hi! I'm Signal. Type a message and tap Send.</div>
</div>

<div id="bar">
  <textarea id="box" rows="2" placeholder="Type here..."></textarea>
  <button id="go">Send</button>
</div>

<script>
// Your OpenRouter key
var KEY = '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';

// We use the Anthropic Claude API via claude.ai's artifact proxy instead
// Actually use a simple XMLHttpRequest which bypasses some CORS issues
var history = [];

document.getElementById('go').addEventListener('click', sendMsg);
document.getElementById('box').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

function sendMsg() {
  var box = document.getElementById('box');
  var text = box.value.trim();
  if (!text) return;
  box.value = '';

  addDiv('u', text);
  history.push({ role: 'user', content: text });

  var thinking = addDiv('a', 'Thinking...');
  document.getElementById('go').disabled = true;

  var messages = [{ role: 'system', content: 'You are Signal, a helpful personal AI assistant. Be concise and useful.' }].concat(history);

  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://openrouter.ai/api/v1/chat/completions', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Authorization', 'Bearer ' + KEY);
  xhr.setRequestHeader('HTTP-Referer', location.href);
  xhr.setRequestHeader('X-Title', 'Signal');

  xhr.onload = function() {
    document.getElementById('go').disabled = false;
    try {
      var data = JSON.parse(xhr.responseText);
      if (xhr.status !== 200) {
        throw new Error('HTTP ' + xhr.status + ': ' + (data.error ? data.error.message : xhr.responseText.slice(0, 150)));
      }
      var reply = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
      if (!reply) throw new Error('Empty reply. Raw response: ' + xhr.responseText.slice(0, 300));
      thinking.textContent = reply;
      history.push({ role: 'assistant', content: reply });
    } catch(e) {
      thinking.remove();
      addDiv('err', 'ERROR: ' + e.message);
      history.pop();
    }
  };

  xhr.onerror = function() {
    document.getElementById('go').disabled = false;
    thinking.remove();
    addDiv('err', 'Network error — cannot reach OpenRouter.\n\nMake sure you are on the internet and try again.\n\nStatus: ' + xhr.status);
    history.pop();
  };

  xhr.ontimeout = function() {
    document.getElementById('go').disabled = false;
    thinking.remove();
    addDiv('err', 'Request timed out. Check your connection.');
    history.pop();
  };

  xhr.timeout = 30000;

  try {
    xhr.send(JSON.stringify({
      model: 'google/gemma-3-12b-it:free',
      messages: messages,
      max_tokens: 1024
    }));
  } catch(e) {
    document.getElementById('go').disabled = false;
    thinking.remove();
    addDiv('err', 'Send failed: ' + e.message);
    history.pop();
  }
}

function addDiv(cls, text) {
  var log = document.getElementById('log');
  var div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}
</script>

</body>
</html>
